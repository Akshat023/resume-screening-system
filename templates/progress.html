{% extends "base.html" %}
{% block title %}Screening in Progress{% endblock %}
{% block content %}
<div style="max-width:560px;margin:80px auto;text-align:center">
  <div class="card" style="padding:40px">
    <div style="font-size:2.5rem;margin-bottom:16px">⚙️</div>
    <h1 style="font-size:1.4rem;margin-bottom:8px">Screening in Progress</h1>
    <p style="color:#a0a0c0;font-size:0.9rem;margin-bottom:32px">
      Processing <strong>{{ total }}</strong> resume(s) for <strong>{{ job_title }}</strong>
    </p>

    <!-- Progress bar -->
    <div style="background:#1f2937;border-radius:8px;height:12px;overflow:hidden;margin-bottom:16px">
      <div id="progress_fill"
           style="height:100%;background:#6366f1;border-radius:8px;
                  transition:width 0.4s ease;width:0%"></div>
    </div>

    <div id="status_text"
         style="color:#a0a0c0;font-size:0.9rem;margin-bottom:8px">
      Starting...
    </div>
    <div id="progress_label"
         style="color:#6366f1;font-size:0.85rem;font-weight:600">
      0 / {{ total }}
    </div>

    <!-- Spinner -->
    <div id="spinner" style="margin-top:24px">
      <div style="display:inline-block;width:32px;height:32px;border:3px solid #2d2d44;
                  border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite">
      </div>
    </div>

    <div id="done_section" style="display:none;margin-top:24px">
      <a id="results_link" href="/candidates/{{ job_id }}"
         class="btn btn-primary" style="padding:12px 32px;font-size:1rem">
        View Results →
      </a>
    </div>

    <div id="error_section" style="display:none;margin-top:24px">
      <div class="alert alert-error" id="error_msg"></div>
      <a href="/" class="btn btn-secondary" style="margin-top:12px">← Back</a>
    </div>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
const taskId = "{{ task_id }}";
const total  = {{ total }};

async function poll() {
  try {
    const res  = await fetch(`/status/${taskId}`);
    const data = await res.json();

    const pct  = total > 0 ? Math.round((data.progress / total) * 100) : 0;
    document.getElementById('progress_fill').style.width  = pct + '%';
    document.getElementById('status_text').textContent    = data.message || '';
    document.getElementById('progress_label').textContent = `${data.progress} / ${total}`;

    if (data.status === 'done') {
      document.getElementById('spinner').style.display      = 'none';
      document.getElementById('done_section').style.display = 'block';
      document.getElementById('progress_fill').style.width  = '100%';
      return; // stop polling
    }

    if (data.status === 'error') {
      document.getElementById('spinner').style.display       = 'none';
      document.getElementById('error_section').style.display = 'block';
      document.getElementById('error_msg').textContent       = data.message;
      return; // stop polling
    }

    // Still running — poll again in 2 seconds
    setTimeout(poll, 2000);

  } catch (err) {
    setTimeout(poll, 3000); // network hiccup — retry in 3s
  }
}

// Start polling after 1 second
setTimeout(poll, 1000);
</script>
{% endblock %}
