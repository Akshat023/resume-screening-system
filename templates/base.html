<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Resume Screening System{% endblock %}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh}
  nav{background:#1a1a2e;padding:14px 32px;display:flex;align-items:center;gap:24px;border-bottom:1px solid #2d2d44}
  nav .logo{font-size:1.2rem;font-weight:700;color:#fff}
  nav a{color:#a0a0c0;text-decoration:none;font-size:0.9rem;padding:6px 14px;border-radius:6px;transition:background 0.2s}
  nav a:hover,nav a.active{background:#2d2d44;color:#fff}
  .container{max-width:1200px;margin:0 auto;padding:32px 24px}
  .card{background:#1a1a2e;border:1px solid #2d2d44;border-radius:12px;padding:24px;margin-bottom:20px}
  .card h2{font-size:1.1rem;margin-bottom:16px;color:#fff}
  input,textarea,select{width:100%;padding:10px 14px;background:#0f1117;border:1px solid #3d3d5c;
    border-radius:8px;color:#e0e0e0;font-size:0.95rem;margin-bottom:12px}
  input:focus,textarea:focus,select:focus{outline:none;border-color:#6366f1}
  label{display:block;font-size:0.85rem;color:#a0a0c0;margin-bottom:4px}
  .btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:0.9rem;font-weight:600;transition:all 0.2s}
  .btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#4f46e5}
  .btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}
  .btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
  .btn-secondary{background:#374151;color:#fff}.btn-secondary:hover{background:#4b5563}
  .btn-sm{padding:6px 12px;font-size:0.8rem}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.78rem;font-weight:600}
  .badge-fit{background:#064e3b;color:#34d399}
  .badge-maybe{background:#78350f;color:#fbbf24}
  .badge-notfit{background:#7f1d1d;color:#f87171}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .metric{background:#0f1117;border:1px solid #2d2d44;border-radius:10px;padding:16px;text-align:center}
  .metric .value{font-size:2rem;font-weight:700;color:#6366f1}
  .metric .label{font-size:0.8rem;color:#a0a0c0;margin-top:4px}
  .progress-bar{height:8px;background:#1f2937;border-radius:4px;overflow:hidden;margin:4px 0}
  .progress-fill{height:100%;border-radius:4px;background:#6366f1;transition:width 0.3s}
  .tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:0.75rem;margin:2px}
  .tag-green{background:#064e3b;color:#34d399}
  .tag-red{background:#7f1d1d;color:#f87171}
  .alert{padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:0.9rem}
  .alert-error{background:#7f1d1d;color:#f87171}
  .alert-warning{background:#78350f;color:#fbbf24}
  .alert-success{background:#064e3b;color:#34d399}
  .sidebar{width:240px;min-width:240px}
  .layout{display:flex;gap:24px}
  .main-content{flex:1;min-width:0}
  .job-link{display:block;padding:8px 12px;border-radius:6px;color:#a0a0c0;text-decoration:none;
    font-size:0.85rem;margin-bottom:4px;border:1px solid transparent}
  .job-link:hover{background:#2d2d44;color:#fff;border-color:#3d3d5c}
  details{border:1px solid #2d2d44;border-radius:10px;margin-bottom:12px;overflow:hidden}
  details summary{padding:16px 20px;cursor:pointer;list-style:none;display:flex;
    align-items:center;justify-content:space-between;background:#1a1a2e}
  details summary:hover{background:#22223a}
  details[open] summary{border-bottom:1px solid #2d2d44}
  .details-body{padding:20px;background:#141428}
  .tabs{display:flex;gap:4px;margin-bottom:20px}
  .tab-btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;
    background:#1a1a2e;color:#a0a0c0;font-size:0.9rem}
  .tab-btn.active{background:#6366f1;color:#fff}
  @media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
    .layout{flex-direction:column}.sidebar{width:100%}}

  /* ── Page loading overlay ── */
  #page_loading{
    display:none;
    position:fixed;inset:0;
    background:rgba(15,17,23,0.88);
    z-index:9999;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:16px;
    backdrop-filter:blur(2px);
  }
  #page_loading.active{display:flex;}
  #page_loading .pl-spinner{
    width:44px;height:44px;
    border:3px solid #2d2d44;
    border-top-color:#6366f1;
    border-radius:50%;
    animation:pl-spin 0.7s linear infinite;
  }
  #page_loading .pl-label{
    color:#e0e0e0;font-size:1rem;font-weight:600;
  }
  #page_loading .pl-sub{
    color:#a0a0c0;font-size:0.82rem;
  }
  @keyframes pl-spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav>
  <span class="logo">📄 Resume Screener</span>
  <a href="/" {% if request.endpoint=='index' %}class="active"{% endif %}>Screen</a>
</nav>
<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<!-- Global page loading overlay — shown on job-link and nav clicks -->
<div id="page_loading">
  <div class="pl-spinner"></div>
  <div class="pl-label" id="pl_label">Loading...</div>
  <div class="pl-sub">Fetching candidate data</div>
</div>

<script>
// Show loading overlay whenever a .job-link or slow nav link is clicked
(function() {
  const overlay = document.getElementById('page_loading');
  const label   = document.getElementById('pl_label');

  function showLoading(text) {
    label.textContent = text || 'Loading...';
    overlay.classList.add('active');
  }

  // Job links in sidebar — these trigger DB fetch which takes 3-6s
  document.addEventListener('click', function(e) {
    const link = e.target.closest('a');
    if (!link) return;

    // Skip: external links, anchor links, buttons styled as links
    const href = link.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;

    // Skip: export CSV (triggers download, not navigation)
    if (href.includes('export_csv')) return;

    // Skip: filter buttons on candidates page (fast, same page)
    if (href.includes('?filter=')) return;

    // Job links
    if (link.classList.contains('job-link')) {
      const jobName = link.textContent.replace('📋', '').trim();
      showLoading('Loading ' + jobName + '...');
      return;
    }

    // Analytics link
    if (href.includes('/analytics/')) {
      showLoading('Loading analytics...');
      return;
    }

    // Candidates link
    if (href.includes('/candidates/')) {
      showLoading('Loading candidates...');
      return;
    }

    // Home / Screen link
    if (href === '/') {
      showLoading('Loading...');
      return;
    }
  });

  // Hide overlay if user hits back button (browser restores page from cache)
  window.addEventListener('pageshow', function(e) {
    if (e.persisted) {
      overlay.classList.remove('active');
    }
  });
})();
</script>

</body>
</html>
